version: '3.9'

services:
  api:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: schoolsync_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://schoolsync:${POSTGRES_PASSWORD}@postgres:5432/schoolsync
      REDIS_URL: redis://redis:6379

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: schoolsync_frontend
    restart: unless-stopped
    ports:
      - "80:80"

  postgres:
    image: postgres:15-alpine
    container_name: schoolsync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: schoolsync
      POSTGRES_USER: schoolsync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolsync -d schoolsync"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: schoolsync_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
